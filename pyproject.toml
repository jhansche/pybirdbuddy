[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "pybirdbuddy"
version = "0.0.21"
description = "A library to query data about a Bird Buddy smart bird feeder"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "jhansche", email = "madcoder@gmail.com" }]
dependencies = [
    "python-graphql-client",
    "langcodes",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.1",
    "pytest-asyncio>=1.4",
    "pytest-aiohttp>=1.1",
    "pytest-cov>=7.1",
    "coverage>=7.15",
    "pyyaml>=6.0.3",
    "ruff~=0.15.20",
    "pyright~=1.1.411",
    "build>=1.5",
    "twine>=6.2",
]

[project.urls]
Homepage = "https://github.com/jhansche/pybirdbuddy"

[tool.setuptools.packages.find]
include = ["birdbuddy*"]
